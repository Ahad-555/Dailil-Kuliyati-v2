<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل كليتي - جامعة الحدود الشمالية</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <img src="logo.png" alt="شعار جامعة الحدود الشمالية" class="logo">

            <p>بوابتك الشاملة لخدمات الكلية</p>

        <main class="grid-container">
            <div class="grid-item">
                <span class="icon">📅</span>

            <div class="grid-item">
                <span class="icon">⚡</span>
                <h3>الدليل السريع</h3>
            </div>
            <div class="grid-item">
                <span class="icon">➕</span>
                <h3>حاسبة المعدل</h3>
            </div>
            <div class="grid-item">
                <span class="icon">📢</span>
                <h3>النشرات والإعلانات</h3>
            </div>
        </main>

        <footer>
            <p>تم تطوير هذا الموقع لخدمة طالبات جامعة الحدود الشمالية في رفحاء</p>
            <p class="copyright">دليل كليتي التفاعلي | عهد الشمري 2026</p>
        </header>
    </div>

</html>
