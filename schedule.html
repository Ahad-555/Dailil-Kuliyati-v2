<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول المحاضرات - دليل كليتي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="glass-card">
        <div class="top-border"></div>
        <div class="logo-wrapper">
            <img src="logo.png" alt="لوجو">
        </div>
        <h2 class="page-title">جدول دليل كليتي</h2>

        <div class="search-container">
            <input type="text" placeholder="ابحثي عن دكتورة أو مادة..." id="searchInput">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active">الكل</button>
            <button class="tab-btn">تطبيقية</button>
            <button class="tab-btn">حاسبات</button>
            <button class="tab-btn">صيدلة</button>
        </div>

        <div class="schedule-list">
            <div class="schedule-item">
                <div class="course-info">
                    <span class="instructor">د. آمنة الشمري</span>
                    <span class="course-name">مقدمة في البرمجة</span>
                </div>
                <div class="time-info">
                    <span class="time">08:00 - 09:40</span>
                    <span class="room">القاعة: GH1 111</span>
                </div>
                <div class="tag">MIS</div>
            </div>
        </div>

        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-arrow-right"></i> العودة للقائمة
        </a>
    </div>

    <footer class="centered-footer">
        <p class="footer-copy">دليل كليتي التفاعلي — © عهد الشمري 2026</p>
    </footer>
</body>
</html>
